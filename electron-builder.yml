# electron-builder packaging config. Consumed by `pnpm dist` after
# `electron-vite build` emits the compiled app into out/.
#
# App icons are not wired yet — drop build/icon.ico (Windows, 256×256+),
# build/icon.png (Linux, 512×512) and build/icon.icns (macOS) and add the
# matching `icon:` keys under win/linux/mac to brand the installers. Until
# then electron-builder falls back to the default Electron icon.
appId: com.c2launcher.app
productName: C² Launcher
copyright: Copyright © 2026 C² contributors

directories:
  output: dist
  buildResources: build

# Ship the compiled output, the runtime manifest, and resources/. The latter
# holds runtime assets (e.g. the tray icon) that electron-vite's `?asset`
# imports reference at run time as join(__dirname, '../../resources/...') —
# i.e. <asar>/resources/. Omitting it leaves that path empty in the package
# (blank tray icon), even though it resolves fine against the source tree in
# dev. Sources, mockups and dev config still stay out of the package.
files:
  - out/**/*
  - resources/**/*
  - package.json

# electron-updater reads this to discover new releases. Point it at the
# repository that hosts the published installers (GitHub Releases).
publish:
  provider: github
  owner: Shroud-y
  repo: c2launcher
  # Assets upload to a draft release; review and click Publish when ready.
  releaseType: draft

win:
  # No explicit icon: electron-builder generates a valid multi-size .ico from
  # build/icon.png (1024×1024). A hand-made icon.ico with a single oversized
  # image made NSIS fail with "invalid icon file size".
  target:
    - target: nsis
      arch:
        - x64

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false
  # customRemoveFiles: on update, delete only the app's own files instead of
  # wiping the whole install dir — protects user data placed inside it.
  include: build/installer.nsh

linux:
  icon: build/icon.png
  category: Game
  maintainer: C² contributors
  target:
    - AppImage
    - deb
